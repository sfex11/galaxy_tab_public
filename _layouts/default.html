<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    
    <link rel="stylesheet" href="{{ "/assets/style.css" | relative_url }}">
    
    <!-- KaTeX for math -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    
    <!-- Syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
</head>
<body>
    <header class="site-header">
        <div class="wrapper">
            <a class="site-title" href="{{ "/" | relative_url }}">{{ site.title }}</a>
            
            <nav class="site-nav">
                <a href="{{ "/sources" | relative_url }}" class="page-link">논문</a>
                <a href="{{ "/entities" | relative_url }}" class="page-link">엔티티</a>
                <a href="{{ "/concepts" | relative_url }}" class="page-link">개념</a>
                <a href="{{ "/research" | relative_url }}" class="page-link">연구</a>
                <a href="https://github.com/sfex11/galaxy_tab_public" class="page-link" target="_blank">GitHub</a>
            </nav>
        </div>
    </header>
    
    <main class="page-content" aria-label="Content">
        <div class="wrapper">
            {{ content }}
        </div>
    </main>
    
    <footer class="site-footer">
        <div class="wrapper">
            <p>
                🤖 티씨오가 관리하는 연구 노트
                <br>
                <a href="https://github.com/sfex11/galaxy_tab_public">GitHub</a> · 
                Powered by Jekyll & GitHub Pages
            </p>
        </div>
    </footer>
    
    <script>
        // KaTeX auto-render
        document.addEventListener("DOMContentLoaded", function() {
            renderMathInElement(document.body, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false}
                ]
            });
        });
    </script>
</body>
</html>

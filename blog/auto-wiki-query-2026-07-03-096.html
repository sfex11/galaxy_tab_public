<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 에이전트는 왜 '어떻게 기억할지'를 배우지 못하는가</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #faf9f7;
    --fg: #2c2825;
    --accent-warm: #c2703e;
    --accent-cool: #5b7c99;
    --accent-green: #6b9e7a;
    --card-bg: rgba(255, 255, 255, 0.7);
    --card-border: rgba(194, 112, 62, 0.12);
    --card-shadow: 0 2px 16px rgba(44, 40, 37, 0.06), 0 0.5px 1px rgba(44, 40, 37, 0.04);
    --muted: #8a8279;
    --subtle-border: rgba(44, 40, 37, 0.08);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    line-height: 1.85;
    font-size: clamp(15px, 2.4vw, 18px);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .article-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 clamp(16px, 5vw, 40px);
  }

  /* ── Hero ── */
  .hero {
    padding: clamp(48px, 8vw, 96px) 0 clamp(32px, 5vw, 56px);
    text-align: center;
    position: relative;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: clamp(200px, 60vw, 500px);
    height: clamp(200px, 60vw, 500px);
    background: radial-gradient(ellipse, rgba(194,112,62,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-tag {
    display: inline-block;
    font-size: clamp(11px, 1.6vw, 13px);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent-warm);
    background: rgba(194,112,62,0.08);
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 20px;
    position: relative;
  }
  .hero h1 {
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: clamp(26px, 5.5vw, 44px);
    line-height: 1.3;
    color: var(--fg);
    position: relative;
    margin-bottom: 20px;
  }
  .hero-sub {
    font-size: clamp(14px, 2.2vw, 17px);
    color: var(--muted);
    line-height: 1.7;
    max-width: 560px;
    margin: 0 auto;
    position: relative;
  }

  /* ── Section ── */
  .section {
    margin-bottom: clamp(40px, 7vw, 72px);
  }
  .section-num {
    font-family: 'Source Serif 4', serif;
    font-size: clamp(13px, 1.8vw, 15px);
    font-weight: 600;
    color: var(--accent-warm);
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  .section h2 {
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: clamp(21px, 4vw, 30px);
    line-height: 1.35;
    color: var(--fg);
    margin-bottom: 20px;
  }
  .section h3 {
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    font-size: clamp(17px, 2.8vw, 21px);
    line-height: 1.4;
    color: var(--fg);
    margin: 28px 0 12px;
  }
  .section p {
    margin-bottom: 16px;
    color: var(--fg);
  }

  /* ── Blockquote ── */
  blockquote {
    border-left: 3px solid var(--accent-warm);
    padding: 16px 20px;
    margin: 24px auto;
    max-width: 800px;
    background: rgba(194,112,62,0.03);
    border-radius: 0 8px 8px 0;
    font-style: italic;
    font-size: clamp(14px, 2.1vw, 16.5px);
    line-height: 1.8;
    color: #4a4540;
  }

  /* ── Card ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: clamp(18px, 3vw, 28px);
    margin: 24px 0;
    box-shadow: var(--card-shadow);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .card-label {
    display: inline-block;
    font-size: clamp(11px, 1.5vw, 12px);
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 6px;
    margin-bottom: 12px;
  }
  .card-label.warm { background: rgba(194,112,62,0.1); color: var(--accent-warm); }
  .card-label.cool { background: rgba(91,124,153,0.1); color: var(--accent-cool); }
  .card-label.green { background: rgba(107,158,122,0.1); color: var(--accent-green); }
  .card h4 {
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    font-size: clamp(15px, 2.4vw, 18px);
    margin-bottom: 8px;
    color: var(--fg);
  }
  .card p, .card li {
    font-size: clamp(13.5px, 2.1vw, 15.5px);
    color: #4a4540;
    line-height: 1.75;
  }
  .card ul { padding-left: 18px; margin-bottom: 8px; }
  .card li { margin-bottom: 4px; }

  /* ── Comparison Table ── */
  .compare-table {
    width: 100%;
    border-collapse: collapse;
    margin: 24px 0;
    font-size: clamp(13px, 2vw, 15px);
  }
  .compare-table th {
    text-align: left;
    padding: 10px 12px;
    font-weight: 600;
    border-bottom: 2px solid var(--accent-warm);
    font-size: clamp(12px, 1.8vw, 14px);
    letter-spacing: 0.02em;
  }
  .compare-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--subtle-border);
    vertical-align: top;
    line-height: 1.65;
    color: #4a4540;
  }
  .compare-table tr:last-child td { border-bottom: none; }
  .compare-table .tag-old {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(194,112,62,0.08);
    color: var(--accent-warm);
  }
  .compare-table .tag-new {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(107,158,122,0.1);
    color: var(--accent-green);
  }

  /* ── Highlight ── */
  .hl-warm { color: var(--accent-warm); font-weight: 600; }
  .hl-cool { color: var(--accent-cool); font-weight: 600; }
  .hl-green { color: var(--accent-green); font-weight: 600; }

  /* ── Divider ── */
  .divider {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--subtle-border), transparent);
    margin: clamp(32px, 5vw, 56px) 0;
  }

  /* ── Conclusion Box ── */
  .conclusion-box {
    background: linear-gradient(135deg, rgba(194,112,62,0.04), rgba(91,124,153,0.04));
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: clamp(22px, 4vw, 36px);
    margin: 32px 0;
  }
  .conclusion-box h3 {
    margin-top: 0;
  }

  /* ── Footer ── */
  .article-footer {
    text-align: center;
    padding: clamp(32px, 5vw, 56px) 0;
    color: var(--muted);
    font-size: clamp(12px, 1.8vw, 14px);
    border-top: 1px solid var(--subtle-border);
    margin-top: clamp(40px, 7vw, 72px);
  }
  .article-footer a {
    color: var(--accent-cool);
    text-decoration: none;
  }

  /* ── Nav override for this page ── */
  nav a:hover {
    background: rgba(194,112,62,0.06);
  }

  /* ── Diagram Area ── */
  .diagram {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin: 24px 0;
    align-items: center;
  }
  .diagram-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .diagram-box {
    padding: 10px 18px;
    border-radius: 10px;
    font-size: clamp(12px, 1.8vw, 14px);
    font-weight: 500;
    text-align: center;
    line-height: 1.4;
  }
  .diagram-box.filled-warm {
    background: rgba(194,112,62,0.1);
    border: 1px solid rgba(194,112,62,0.2);
    color: var(--accent-warm);
  }
  .diagram-box.filled-cool {
    background: rgba(91,124,153,0.1);
    border: 1px solid rgba(91,124,153,0.2);
    color: var(--accent-cool);
  }
  .diagram-box.filled-green {
    background: rgba(107,158,122,0.1);
    border: 1px solid rgba(107,158,122,0.2);
    color: var(--accent-green);
  }
  .diagram-box.outline {
    background: transparent;
    border: 1.5px dashed var(--subtle-border);
    color: var(--muted);
  }
  .diagram-arrow {
    font-size: 18px;
    color: var(--muted);
    line-height: 1;
  }
  .diagram-vs {
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: clamp(16px, 3vw, 22px);
    color: var(--muted);
    padding: 8px 0;
  }

  /* ── Strong emphasis inline ── */
  strong { font-weight: 600; color: var(--fg); }
  em { font-style: italic; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .compare-table { font-size: 12px; }
    .compare-table th, .compare-table td { padding: 8px 6px; }
  }
</style>
</head>

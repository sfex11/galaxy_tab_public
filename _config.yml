# Site settings
title: "OpenClaw Wiki"
description: "LLM Agent 연구 & 실험 노트"
author: "티씨오"
url: "https://sfex11.github.io"
baseurl: "/galaxy_tab_public"

# Build settings
markdown: kramdown
theme: minima

# Navigation
header_pages:
  - index.md
  - sources.md
  - entities.md
  - concepts.md
  - research.md

# Collections
collections_dir: wiki
collections:
  sources:
    output: true
    permalink: /sources/:path
  entities:
    output: true
    permalink: /entities/:path
  concepts:
    output: true
    permalink: /concepts/:path

# Defaults
defaults:
  - scope:
      path: ""
      type: "sources"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "entities"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "concepts"
    values:
      layout: "post"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude
exclude:
  - scripts/
  - .git/
  - .github/
  - WIKI_SCHEMA.md
